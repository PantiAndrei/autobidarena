<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – AutoBid Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --dark:    #080c1a;
      --card:    #0d1225;
      --green:   #2dc653;
      --red:     #e74c3c;
      --accent:  #f0a820;
      --text:    #e8eaf6;
      --muted:   rgba(232,234,246,0.55);
      --border:  rgba(255,255,255,0.08);
      --radius:  10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    /* LOGIN */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
    }
    .login-logo { text-align: center; margin-bottom: 2rem; }
    .login-logo img { height: 56px; border-radius: 8px; }
    .login-box h1 { font-size: 1.4rem; font-weight: 700; text-align: center; margin-bottom: 0.5rem; }
    .login-box p  { text-align: center; color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
    #loginError { color: var(--red); font-size: 0.85rem; text-align: center; margin-top: 1rem; min-height: 1.2em; }

    /* ADMIN LAYOUT */
    #adminScreen { display: none; }
    .admin-header {
      background: rgba(8,12,26,0.95);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .admin-header img { height: 40px; border-radius: 6px; }
    .admin-header h1 { font-size: 1rem; font-weight: 700; }
    .admin-header span { font-size: 0.8rem; color: var(--muted); }
    .admin-header .spacer { flex: 1; }
    .admin-main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* CARDS SUMMARY */
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .summary-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1rem;
      text-align: center;
    }
    .summary-card strong { display: block; font-size: 2rem; font-weight: 800; color: var(--green); }
    .summary-card span   { font-size: 0.8rem; color: var(--muted); }

    /* TABLE AREA */
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .table-header h2 { font-size: 1.1rem; font-weight: 700; }
    .cars-table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead { background: rgba(255,255,255,0.04); }
    th { padding: 0.75rem 1rem; text-align: left; font-weight: 600; color: var(--muted); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
    td { padding: 0.75rem 1rem; border-top: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .td-img img { width: 72px; height: 46px; object-fit: cover; border-radius: 6px; background: #060910; }
    .td-price { color: var(--accent); font-weight: 600; }
    .td-comanda { color: var(--green); font-weight: 600; }
    .td-actions { display: flex; gap: 0.4rem; }
    .empty-row td { text-align: center; padding: 3rem; color: var(--muted); }

    /* FORM */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .form-card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    input[type=text], input[type=number], input[type=email], input[type=password],
    select, textarea {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--green); }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: #0d1225; }
    .checkbox-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.25rem; }
    .checkbox-row input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--green); cursor: pointer; }
    .checkbox-row label { text-transform: none; letter-spacing: 0; font-size: 0.9rem; cursor: pointer; color: var(--text); }
    .form-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; flex-wrap: wrap; }
    #formMsg { font-size: 0.85rem; color: var(--green); margin-top: 0.75rem; min-height: 1.2em; }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.2rem; border-radius: 8px; border: none; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all .2s; }
    .btn-green  { background: var(--green); color: #000; }
    .btn-green:hover { background: #22a042; }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--green); color: var(--green); }
    .btn-red    { background: transparent; color: var(--red); border: 1px solid rgba(231,76,60,0.3); }
    .btn-red:hover { background: rgba(231,76,60,0.12); }
    .btn-edit   { background: transparent; color: var(--accent); border: 1px solid rgba(240,168,32,0.3); }
    .btn-edit:hover { background: rgba(240,168,32,0.1); }
    .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.78rem; }
    .btn-logout { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-logout:hover { color: var(--red); border-color: var(--red); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .img-preview-wrap { margin-top: 0.5rem; }
    .img-preview-wrap img { width: 120px; height: 76px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); display: none; }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .summary-cards { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <!-- ── LOGIN SCREEN ──────────────────────────────────── -->
  <div id="loginScreen">
    <div class="login-box">
      <div class="login-logo">
        <img src="assets/logo.jpg" alt="AutoBid Arena" />
      </div>
      <h1>Panou Administrare</h1>
      <p>Autentifică-te pentru a gestiona anunțurile</p>
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="email@example.com" autocomplete="username" />
      </div>
      <div class="form-group" style="margin-top:1rem">
        <label for="loginPass">Parolă</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <p id="loginError"></p>
      <button class="btn btn-green" id="loginBtn" style="width:100%;justify-content:center;margin-top:1.25rem">
        Intră în cont
      </button>
    </div>
  </div>

  <!-- ── ADMIN SCREEN ───────────────────────────────────── -->
  <div id="adminScreen">
    <header class="admin-header">
      <img src="assets/logo.jpg" alt="AutoBid Arena" />
      <div>
        <h1>Admin Panel</h1>
        <span id="adminEmail"></span>
      </div>
      <div class="spacer"></div>
      <a href="index.html" class="btn btn-outline btn-sm">← Site</a>
      <button class="btn btn-logout btn-sm" id="logoutBtn">Deconectare</button>
    </header>

    <main class="admin-main">

      <!-- Summary -->
      <div class="summary-cards">
        <div class="summary-card">
          <strong id="sumTotal">—</strong>
          <span>Total anunțuri</span>
        </div>
        <div class="summary-card">
          <strong id="sumActive">—</strong>
          <span>Active</span>
        </div>
        <div class="summary-card">
          <strong id="sumComanda">—</strong>
          <span>La Comandă</span>
        </div>
      </div>

      <!-- Add / Edit Form -->
      <div class="form-card">
        <h2 id="formTitle">Adaugă Mașină Nouă</h2>
        <input type="hidden" id="editId" />
        <div class="form-grid">
          <div class="form-group">
            <label for="fMarca">Marcă *</label>
            <input type="text" id="fMarca" list="marcaList" placeholder="BMW, Audi, Dacia..." autocomplete="off" />
            <datalist id="marcaList"></datalist>
          </div>
          <div class="form-group">
            <label for="fModel">Model *</label>
            <input type="text" id="fModel" list="modelList" placeholder="X5, Golf, Logan..." autocomplete="off" />
            <datalist id="modelList"></datalist>
          </div>
          <div class="form-group">
            <label for="fAn">An fabricație</label>
            <select id="fAn">
              <option value="">— An —</option>
            </select>
          </div>
          <div class="form-group">
            <label for="fKm">Kilometraj</label>
            <input type="number" id="fKm" placeholder="45000" min="0" />
          </div>
          <div class="form-group">
            <label for="fPret">Preț (€)</label>
            <input type="number" id="fPret" placeholder="18500" min="0" />
          </div>
          <div class="form-group">
            <label for="fCombustibil">Combustibil</label>
            <select id="fCombustibil">
              <option value="">— Selectează —</option>
              <option>Benzină</option>
              <option>Diesel</option>
              <option>Hibrid</option>
              <option>Electric</option>
              <option>GPL</option>
            </select>
          </div>
          <div class="form-group">
            <label for="fTransmisie">Transmisie</label>
            <select id="fTransmisie">
              <option value="">— Selectează —</option>
              <option>Manuală</option>
              <option>Automată</option>
            </select>
          </div>
          <div class="form-group">
            <label for="fCaroserie">Caroserie</label>
            <select id="fCaroserie">
              <option value="">— Selectează —</option>
              <option>SUV</option>
              <option>Sedan</option>
              <option>Hatchback</option>
              <option>Break</option>
              <option>Coupe</option>
              <option>Monovolum</option>
              <option>Pickup</option>
            </select>
          </div>
          <div class="form-group">
            <label for="fCuloare">Culoare</label>
            <input type="text" id="fCuloare" placeholder="Negru metalizat" />
          </div>
          <div class="form-group full">
            <label for="fImagine">URL Imagine</label>
            <input type="text" id="fImagine" placeholder="https://..." />
            <div class="img-preview-wrap">
              <img id="imgPreview" alt="Preview" />
            </div>
          </div>
          <div class="form-group full">
            <label for="fDescriere">Descriere</label>
            <textarea id="fDescriere" placeholder="Detalii despre mașină, dotări, stare etc."></textarea>
          </div>
          <div class="form-group full">
            <div class="checkbox-row">
              <input type="checkbox" id="fLaComanda" />
              <label for="fLaComanda">Mașină la comandă (fără stoc propriu)</label>
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-green" id="saveBtn">Salvează</button>
          <button class="btn btn-outline" id="cancelBtn" style="display:none">Anulează</button>
        </div>
        <p id="formMsg"></p>
      </div>

      <!-- Cars Table -->
      <div class="table-header">
        <h2>Anunțuri active</h2>
      </div>
      <div class="cars-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Foto</th>
              <th>Mașină</th>
              <th>An</th>
              <th>Km</th>
              <th>Combustibil</th>
              <th>Preț</th>
              <th>Acțiuni</th>
            </tr>
          </thead>
          <tbody id="carsTableBody">
            <tr class="empty-row"><td colspan="7">Se încarcă...</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="admin.js"></script>
</body>
</html>
